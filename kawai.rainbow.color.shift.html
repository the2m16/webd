<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Color Shift Effect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }
        .char {
            display: inline-block;
            white-space: pre;
        }
        @keyframes colorShift { 0% { color: #ffffff; opacity: 0; } 33% { color: #ff0055; opacity: 1; } 66% { color: #00ccff; opacity: 1; } 100% { color: #ffffff; opacity: 1; } }
    </style>
</head>
<body>
    <div id="anim-container"></div>
    <script>
        const text = "Rainbow Color Shift";
        const container = document.getElementById('anim-container');
        
        function play() {
            container.innerHTML = '';
            const chars = text.split('');
            chars.forEach((char, index) => {
                const span = document.createElement('span');
                span.textContent = char;
                span.className = 'char';
                span.style.opacity = '0';
                span.style.animation = 'colorShift 1s forwards';
                span.style.animationDelay = `${index * 0.05}s`;
                container.appendChild(span);
            });
            
            const totalTime = (chars.length * 0.05 * 1000) + (1 * 1000) + 2500;
            setTimeout(play, totalTime);
        }
        play();
    </script>
</body>
</html>
