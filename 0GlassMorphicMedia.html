<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the2m16 - Premium Media Grid (lenis ready)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        /* ==========================================================================
           1. СУУРЬ СТИЛЬҮҮД & GLASS-BOX (ҮНДСЭН ХЭВ МАЯГ)
           ========================================================================== */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.30), rgba(0, 0, 0, 0.40)), 
                        url('https://the2m16.github.io/web/images/background3872x2592.webp') no-repeat center center fixed; /* */
            background-size: cover; color: #ffffff; padding: 40px 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 1000px; } /* */

        .glass-box {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); /* */
            border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 6px; padding: 6px; margin-bottom: 10px; /* */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); /* */
        }

        .glass-box h3 {
            font-size: 14px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 15px; /* */
        }

        /* ==========================================================================
           2. УХААЛАГ ГРИД СҮЛЖЭЭ & КАРТНЫ ХАРЬЦАА ЗАСВАР (A=B, C=D)
           ========================================================================== */
        .gl-smart-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; width: 100%; /* */
        }

        .gl-card-item {
            position: relative; background: rgba(0, 0, 0, 0.2); border-radius: 4px; overflow: hidden; /* */
            border: 1px solid rgba(255, 255, 255, 0.05); width: 100%; aspect-ratio: 16 / 9; /* */
            cursor: pointer; transition: transform 0.3s ease, border-color 0.3s ease; /* */
        }

        .gl-card-item:hover { transform: translateY(0px); border-color: rgba(255, 255, 255, 0.15); /* */ }

        /* 🥇 НӨХЦӨЛ 1: 1 контенттой үед өндөр нь 2 карттай үеийнхтэй ижил байна (A=B, C=D) */
        .gl-smart-grid.count-1 .gl-card-item {
            grid-column: span 2; aspect-ratio: 32 / 9; /* */
        }

        /* Картууд доторх медиа элементүүдийг бүтэн сунгаж дүүргэх бэлтгэл */
        .gl-card-item img, .gl-card-item canvas {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; /* */
        }
        .gl-card-item:hover img, .gl-card-item:hover canvas {
            transform: scale(1.03);
        }

        /* 🔴 YOUTUBE PLAY BUTTON СТИЛЬ */
        .gl-youtube-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 54px; height: 38px; z-index: 5; pointer-events: none;
        }
        .gl-youtube-play-btn svg .yt-bg { fill: rgba(15, 15, 15, 0.85); transition: fill 0.2s ease; } /* */
        .gl-card-item:hover .gl-youtube-play-btn svg .yt-bg { fill: #ff0000; } /* */

        /* ⚫ ОЛОН КОНТЕНТТОЙ ҮЕД БАРУУН КАРТ ДЭЭР СУУХ ХАР МАСК */
        .gl-more-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 17, 0.78); display: flex; align-items: center; justify-content: center; /* */
            font-size: 24px; font-weight: 500; color: #ffffff; z-index: 10; pointer-events: none; /* */
        }

        /* ==========================================================================
           3. ЛАЙТБОКС СИСТЕМ (ПОПАП ЦОНХ)
           ========================================================================== */
        .gl-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 17, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        .gl-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .gl-modal-container { width: 85%; max-width: 750px; position: relative; display: flex; flex-direction: column; align-items: center; }
        .gl-modal-content { width: 100%; border-radius: 12px; overflow: hidden; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.06); display: flex; justify-content: center; align-items: center; }

        .gl-modal-content img { max-width: 100%; max-height: 68vh; object-fit: contain; }
        .gl-modal-content iframe { width: 100%; aspect-ratio: 16 / 9; border: none; }
        .gl-modal-content iframe.sc-viewer { height: 166px; aspect-ratio: auto; }
        .gl-modal-content iframe.pdf-viewer { height: 68vh; aspect-ratio: auto; }
        .gl-modal-caption { margin-top: 15px; color: rgba(255, 255, 255, 0.6); font-size: 13px; text-align: center; }
        .gl-modal-close { position: absolute; top: -45px; right: 0; background: none; border: none; color: rgba(255, 255, 255, 0.5); font-size: 30px; cursor: pointer; }
        .gl-nav-btn-zone { position: absolute; top: 50%; transform: translateY(-50%); width: 70px; height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; z-index: 100; user-select: none; }

        .gl-nav-btn-zone.prev { left: -85px; }
        .gl-nav-btn-zone.next { right: -85px; }
        .gl-arrow-line { width: 15px; height: 15px; border-top: 2px solid rgba(255, 255, 255, 0.4); border-left: 2px solid rgba(255, 255, 255, 0.4); transition: border-color 0.2s ease; }
        .gl-nav-btn-zone.prev .gl-arrow-line { transform: rotate(-45deg); }
        .gl-nav-btn-zone.next .gl-arrow-line { transform: rotate(135deg); }
        .gl-nav-btn-zone:hover .gl-arrow-line { border-color: #ffd700; }
    </style>
</head>
<body>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // PDF.js арын процессорыг асаах
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const grids = document.querySelectorAll('.gl-smart-grid');
        const modal = document.getElementById('glMediaModal');
        const modalContent = document.getElementById('glModalContent');
        const captionTarget = document.getElementById('glModalCaption');
        const modalClose = document.getElementById('glModalClose');
        const btnPrev = document.getElementById('glModalPrev');
        const btnNext = document.getElementById('glModalNext');

        let currentAlbumItems = [];
        let currentActiveIndex = 0;

        grids.forEach(gridEl => {
            const rawData = gridEl.getAttribute('data-images').split(',');
            const parsedItems = [];

            rawData.forEach(item => {
                let trimmed = item.trim();
                if (!trimmed) return;
                const parts = trimmed.split('|');
                const url = parts[0] ? parts[0].trim() : '';
                const caption = parts[1] ? parts[1].trim() : ''; /* */
                if (!url) return;

                let ytId = null; let isYt = false;
                const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                if (match && match[2].length === 11) { ytId = match[2]; isYt = true; }

                parsedItems.push({ url, caption, isYt, ytId });
            });

            const totalCount = parsedItems.length;
            gridEl.classList.add(`count-${totalCount > 2 ? 'multiple' : totalCount}`);

            const displayCount = Math.min(totalCount, 2);

            for (let i = 0; i < displayCount; i++) {
                const mediaData = parsedItems[i]; /* */
                const itemDiv = document.createElement('div'); /* */
                itemDiv.className = 'gl-card-item'; /* */

                // 🔴 1. PDF КАРТ ҮҮСГЭХ
                if (mediaData.url.startsWith('pdf:')) {
                    const actualPdf = mediaData.url.replace('pdf:', '').trim();
                    const canvasId = `pdf-canvas-${Math.floor(Math.random() * 1000000)}`;
                    
                    itemDiv.innerHTML = `
                        <canvas id="${canvasId}" style="width:100%; height:100%; object-fit:cover; display:block;"></canvas>
                        <div style="position:absolute; inset:0; background:rgba(0, 0, 0, 0); z-index:2;"></div>
                        <div style="position:relative; z-index:3; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%; padding:20px; text-align:center;">
                            <svg viewBox="0 0 24 24" style="width:36px; height:36px; fill:#ef4444; margin-bottom:8px;"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                            <div style="font-size:12px; font-weight:500; color:#ffffff; text-shadow:0 2px 4px rgba(0,0,0,0.2);">${mediaData.caption}</div>
                        </div>
                    `;

                    setTimeout(() => {
                        pdfjsLib.getDocument(actualPdf).promise.then(pdf => {
                            pdf.getPage(1).then(page => {
                                const canvas = document.getElementById(canvasId);
                                if (!canvas) return;
                                const context = canvas.getContext('2d');
                                const viewport = page.getViewport({ scale: 2.0 });
                                canvas.height = viewport.height;
                                canvas.width = viewport.width;
                                page.render({ canvasContext: context, viewport: viewport });
                            });
                        }).catch(err => {
                            const canvas = document.getElementById(canvasId);
                            if(canvas) canvas.style.background = "rgba(255,255,255,0.05)";
                        });
                    }, 10);
                } 
                // 🔴 2. SOUNDCLOUD КАРТ ҮҮСГЭХ (ЗАСАР)
                else if (mediaData.url.startsWith('sc:')) {
                    const cleanRaw = mediaData.url.replace('sc:', '').trim();
                    const sepIndex = cleanRaw.indexOf(' :: ');
                    
                    let actualSc = cleanRaw;
                    let scCover = 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=600';
                    
                    if (sepIndex !== -1) {
                        actualSc = cleanRaw.substring(0, sepIndex).trim();
                        scCover = cleanRaw.substring(sepIndex + 4).trim();
                    }

                    itemDiv.innerHTML = `
                        <img src="${scCover}" style="position:absolute; width:100%; height:100%; object-fit:cover; filter:blur(18px) brightness(0.45); transform:scale(1.15); z-index:1;">
                        <div style="position:relative; z-index:2; display:flex; align-items:center; gap:15px; width:100%; height:100%; padding:16px;">
                            <img src="${scCover}" style="width:75px; height:75px; border-radius:6px; object-fit:cover; box-shadow:0 6px 12px rgba(0,0,0,0.5);">
                            <div style="display:flex; flex-direction:column; justify-content:center; flex:1;">
                                <span style="font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#ff5500; font-weight:700;">SoundCloud</span>
                                <div style="font-size:12px; font-weight:500; color:#ffffff; margin-top:3px; line-height:1.3;">${mediaData.caption}</div>
                            </div>
                        </div>
                    `;
                } 
                // 🔴 3. YOUTUBE КАРТ ҮҮСГЭХ
                else if (mediaData.isYt) {
                    itemDiv.innerHTML = `<img src="https://img.youtube.com/vi/${mediaData.ytId}/mqdefault.jpg" alt="" style="width:100%; height:100%; object-fit:cover;"><div class="gl-youtube-play-btn"><svg viewBox="0 0 68 48" width="100%" height="100%"><path class="yt-bg" d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,0.13,34,0,34,0S12.21,0.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z"></path><polygon points="26,33 44,24 26,15" fill="#ffffff"></polygon></svg></div>`; /* */
                } 
                // 🔴 4. ЕРДИЙН ЗУРАГ КАРТ ҮҮСГЭХ (БҮТЭН СУНАХ ЗАСВАРТАЙ)
                else {
                    itemDiv.innerHTML = `<img src="${mediaData.url}" alt="" style="width:100%; height:100%; object-fit:cover;">`; /* */
                }

                // 🎯 ҮЛДЭГДЭЛ ТОХИРГООНЫ МАСК ОРУУЛАХ ХЭСЭГ (ТОМЬЁО ЗАСВАР: totalCount - displayCount)
                if (totalCount > 2 && i === 1) {
                    const overlay = document.createElement('div');
                    overlay.className = 'gl-more-overlay';
                    overlay.innerText = `+${totalCount - displayCount}`; /* */
                    itemDiv.appendChild(overlay);
                }

                itemDiv.addEventListener('click', () => {
                    currentAlbumItems = parsedItems;
                    openLightbox(i);
                });

                gridEl.appendChild(itemDiv);
            }
        });

        // 🖼 ЛАЙТБОКС ДОТОР КОНТЕНТЫГ УХААЛГААР ЗУРЖ ТОГЛУУЛАХ ФУНКЦ
        function renderActiveMedia(index) {
            modalContent.innerHTML = ""; /* */
            const data = currentAlbumItems[index];
            captionTarget.innerText = data.caption; /* */

            if (data.url.startsWith('pdf:')) {
                const cleanPdfUrl = data.url.replace('pdf:', '').trim();
                const iframe = document.createElement('iframe'); /* */
                iframe.src = cleanPdfUrl; /* */
                iframe.className = "pdf-viewer"; /* */
                modalContent.appendChild(iframe); /* */
            } 
            else if (data.url.startsWith('sc:')) {
                const cleanRaw = data.url.replace('sc:', '').trim();
                const sepIndex = cleanRaw.indexOf(' :: ');
                let cleanScUrl = sepIndex !== -1 ? cleanRaw.substring(0, sepIndex).trim() : cleanRaw;

                if (cleanScUrl.includes('auto_play=false')) {
                    cleanScUrl = cleanScUrl.replace('auto_play=false', 'auto_play=true');
                }

                const iframe = document.createElement('iframe'); /* */
                iframe.src = cleanScUrl; /* */
                iframe.className = "sc-viewer";
                iframe.allow = "autoplay";
                iframe.scrolling = "no";
                iframe.frameBorder = "no";
                modalContent.appendChild(iframe); /* */
            } 
            else if (data.isYt) {
                const iframe = document.createElement('iframe'); /* */
                iframe.src = `https://www.youtube.com/embed/${data.ytId}?autoplay=1`; /* */
                iframe.allow = "accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"; /* */
                iframe.allowFullscreen = true; /* */
                modalContent.appendChild(iframe); /* */
            } 
            else {
                const img = document.createElement('img'); /* */
                img.src = data.url; /* */
                modalContent.appendChild(img); /* */
            }

            btnPrev.style.visibility = index === 0 ? 'hidden' : 'visible';
            btnNext.style.visibility = index === currentAlbumItems.length - 1 ? 'hidden' : 'visible';
        }

        // 🚀 ЛАЙТБОКС НЭЭХ (ЗАСВАР: LENIS STOP ХОЛБОСОН)
        function openLightbox(index) {
            currentActiveIndex = index;
            renderActiveMedia(currentActiveIndex); /* */
            modal.classList.add('active'); /* */

            // ✅ Lenis скроллыг түр түгжих
            if (window.lenis) {
                window.lenis.stop();
            } else if (typeof lenis !== 'undefined') {
                lenis.stop();
            }
        }

        btnPrev.addEventListener('click', (e) => {
            e.stopPropagation(); /* */
            if (currentActiveIndex > 0) { currentActiveIndex--; renderActiveMedia(currentActiveIndex); } /* */
        });

        btnNext.addEventListener('click', (e) => {
            e.stopPropagation(); /* */
            if (currentActiveIndex < currentAlbumItems.length - 1) { currentActiveIndex++; renderActiveMedia(currentActiveIndex); } /* */
        });

        // 🚀 ЛАЙТБОКС ХААХ (ЗАСВАР: LENIS START ХОЛБОСОН)
        const closeBox = () => { 
            modal.classList.remove('active'); /* */
            modalContent.innerHTML = ""; /* */

            // ✅ Lenis скроллыг буцааж ажиллуулах
            if (window.lenis) {
                window.lenis.start();
            } else if (typeof lenis !== 'undefined') {
                lenis.start();
            }
        };

        modalClose.addEventListener('click', closeBox); /* */
        modal.addEventListener('click', (e) => { if (e.target === modal) closeBox(); }); /* */
    });
</script>
